<svg width="800" height="970" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ffffff" stroke="#333" stroke-width="0.5" />
    </marker>
  </defs>
  <style>
    .node-text { font-family: Arial, sans-serif; font-size: 12px; text-anchor: middle; dominant-baseline: middle; fill: #333; font-weight: 500; }
    .edge-label { font-family: Arial, sans-serif; font-size: 11px; fill: #666; text-anchor: middle; }
  </style>
  <line x1="400" y1="80" x2="400" y2="110" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="400" y1="190" x2="400" y2="240" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="400.0" y="210.0" class="edge-label">Has items</text>
  <line x1="460" y1="150" x2="400" y2="320" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="430.0" y="230.0" class="edge-label">No items</text>
  <path d="M 400 300 Q 400.0 50 400 110" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)" />
  <text x="400.0" y="40" class="edge-label">Loop back</text>
  <line x1="400" y1="380" x2="400" y2="390" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="400" y1="470" x2="400" y2="520" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="400.0" y="490.0" class="edge-label">Yes</text>
  <line x1="400" y1="580" x2="400" y2="600" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="400" y1="470" x2="400" y2="600" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <text x="400.0" y="530.0" class="edge-label">No</text>
  <line x1="400" y1="660" x2="400" y2="680" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="400" y1="740" x2="400" y2="760" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <line x1="400" y1="820" x2="400" y2="840" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <ellipse cx="400" cy="50" rx="75" ry="30" fill="#e8f4f8" stroke="#2196F3" stroke-width="3" />
  <text x="400" y="50.0" class="node-text">Start: loop_example</text>
  <polygon points="400,110 460,150 400,190 340,150" fill="#fff4e6" stroke="#ff9800" stroke-width="2" />
  <text x="400" y="150.0" class="node-text">for item in items</text>
  <rect x="325" y="240" width="150" height="60" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="5" />
  <text x="400" y="270.0" class="node-text">Loop Body</text>
  <rect x="325" y="320" width="150" height="60" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="5" />
  <text x="400" y="350.0" class="node-text">Continue</text>
  <polygon points="400,390 460,430 400,470 340,430" fill="#fff4e6" stroke="#ff9800" stroke-width="2" />
  <text x="400" y="430.0" class="node-text">item > 5</text>
  <rect x="325" y="520" width="150" height="60" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="5" />
  <text x="400" y="550.0" class="node-text">If Body</text>
  <rect x="325" y="600" width="150" height="60" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="5" />
  <text x="400" y="630.0" class="node-text">Continue</text>
  <rect x="325" y="680" width="150" height="60" fill="#e8f5e9" stroke="#4caf50" stroke-width="2" rx="5" />
  <text x="400" y="710.0" class="node-text">result.append</text>
  <ellipse cx="400" cy="790" rx="75" ry="30" fill="#ffebee" stroke="#f44336" stroke-width="2" />
  <text x="400" y="790.0" class="node-text">Return</text>
  <ellipse cx="400" cy="870" rx="75" ry="30" fill="#ffebee" stroke="#f44336" stroke-width="2" />
  <text x="400" y="870.0" class="node-text">End</text>
</svg>